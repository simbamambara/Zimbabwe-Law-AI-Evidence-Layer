name: Evidence Layer CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Rebuild controlled derivatives
        shell: bash
        run: |
          if [ -f data/raw/zimbabwe_2022_law_reports_all_courts_rebuilt.jsonl ]; then
            python scripts/normalise_dataset.py
            python scripts/build_public_release.py
          else
            echo "Raw dataset is not present; running code-only tests."
          fi

      - name: Validate normalized dataset
        shell: bash
        run: |
          if [ -f data/processed/zimbabwe_2022_law_reports_normalized.jsonl ]; then
            python scripts/validate_dataset.py
          else
            echo "Normalized dataset is not present; validation skipped."
          fi

      - name: Run test suite
        run: pytest -q

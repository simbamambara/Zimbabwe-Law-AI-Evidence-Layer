name: Evidence Layer CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q
      - name: Validate dataset when present
        shell: bash
        run: |
          if [ -f data/processed/zimbabwe_2022_law_reports_normalized.jsonl ]; then
            python scripts/validate_dataset.py
          else
            echo "Manual dataset upload pending; code and structure checks completed."
          fi
